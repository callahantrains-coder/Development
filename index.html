<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery</title>
  <style>
    body { font-family: Arial; }
    #search { margin: 20px; padding: 10px; width: 300px; }
    .gallery { display: flex; flex-wrap: wrap; gap: 10px; }
    .item { width: 200px; }
    img { width: 100%; height: auto; }
  </style>
</head>
<body>

<input type="text" id="search" placeholder="Search images...">

<div class="gallery" id="gallery"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRStPO8x9fBkPafkwC-LjRP7d9Q8Y6hVfSbp--bI1hsIS9CbUfKyhmARF_fmyoS-lr-_qra59nFy9Cu/pub?gid=1755179409&single=true&output=csv";

let data = [];

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    data = rows.map(row => {
      const cols = row.split(",");
      return {
        name: cols[0],
        category: cols[1],
        tags: cols[2],
        image: cols[3]
      };
    });
    display(data);
  });

function display(items) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  items.forEach(item => {
    gallery.innerHTML += `
      <div class="item">
        <img src="${item.image}">
        <p>${item.name}</p>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  const filtered = data.filter(item =>
    item.name.toLowerCase().includes(term) ||
    item.tags.toLowerCase().includes(term) ||
    item.category.toLowerCase().includes(term)
  );
  display(filtered);
});
</script>

</body>
</html>
