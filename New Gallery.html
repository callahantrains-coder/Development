<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Catalog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f5f7fb;
}

header {
  padding: 20px;
  background: #111827;
  color: white;
  text-align: center;
}

.controls {
  display: flex;
  gap: 10px;
  padding: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  min-width: 200px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 200px;
  height: auto;
  margin-bottom: 10px;
}

.Description {
  font-weight: 600;
  font-size: 18px;
}

.Value {
  color: #6b7280;
  font-size: 14px;
}

.badge {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #eef2ff;
  font-size: 12px;
}

</style>
</head>

<body>

<header>
  <h1>Train Catalog</h1>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search Catalog...">
    <select id="brandFilter">
    <option value="">All Brands</option>
  </select>
  <select id="labelFilter">
    <option value="">All Labels</option>
  </select>
</div>

<div class="grid" id="catalog"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShMcetYSuHqwQk8AhiDBQB1hK4qoQkYLpoMwUpnBg7gH3lte5tdFo5vyh-7hZlSLdoXkf9eO32Ex17/pub?gid=1291792471&single=true&output=csv";

let items = [];

async function fetchData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows.shift();

  items = rows.map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
    return obj;
  });

  populateFilters();
  render(items);
}

function populateFilters() {
  const labelSet = new Set();
  const brandSet = new Set();

  items.forEach(item => {
    labelSet.add(item.Label);
    brandSet.add(item.Brand);
  });

  const labelSelect = document.getElementById("labelFilter");
  const brandSelect = document.getElementById("brandFilter");

  labelSet.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    labelSelect.appendChild(opt);
  });

  brandSet.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    brandSelect.appendChild(opt);
  });
}

function render(data) {
  const container = document.getElementById("catalog");
  container.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src=${item.Picture}>
      <div class="Description">${item.Description}</div>
      <div class="badge">${item["Asset Number"]}</div>
      <div class="badge">${item.Brand}</div>
      <div class="badge">${item.Label}</div>
      <div class="badge">${item.Value}</div>
    `;

    container.appendChild(card);
  });
}

function applyFilters() {
  const search = document.getElementById("search").value.toLowerCase();
  const label = document.getElementById("labelFilter").value;
  const loc = document.getElementById("brandFilter").value;

  const filtered = items.filter(item => {
    return (
      (!label || item.Label === label) &&
      (!loc || item.Brand === loc) &&
      (
        item.Description.toLowerCase().includes(search) ||
        item.Value.toLowerCase().includes(search)
      )
    );
  });

  render(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("labelFilter").addEventListener("change", applyFilters);
document.getElementById("brandFilter").addEventListener("change", applyFilters);

fetchData();
</script>

</body>
</html>
