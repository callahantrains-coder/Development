<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Filtered Image Gallery</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .filters { margin-bottom: 20px; }
    select { padding: 8px; margin-right: 10px; }
    .gallery { display: flex; flex-wrap: wrap; gap: 15px; }
    .item { width: 200px; text-align: center; }
    .item img { width: 100%; border-radius: 6px; }
  </style>
</head>
<body>

<h2>Image Gallery</h2>

<div class="filters">
  <select id="categoryFilter">
    <option value="">All Categories</option>
  </select>

  <select id="typeFilter">
    <option value="">All Types</option>
  </select>
</div>

<div class="gallery" id="gallery"></div>

<script>
// ---- CONFIG ----
const CSV_URL = "";

// ---- LOAD CSV ----
async function loadCSV() {
  const response = await fetch(CSV_URL);
  const text = await response.text();
  return parseCSV(text);
}

// ---- PARSE CSV ----
function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows.shift();
  return rows.map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
    return obj;
  });
}

// ---- POPULATE FILTERS ----
function populateFilters(data) {
  const categorySet = new Set();
  const typeSet = new Set();

  data.forEach(item => {
    if (item.Category) categorySet.add(item.Category);
    if (item.Type) typeSet.add(item.Type);
  });

  const categoryFilter = document.getElementById("categoryFilter");
  const typeFilter = document.getElementById("typeFilter");

  categorySet.forEach(cat => {
    categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
  });

  typeSet.forEach(type => {
    typeFilter.innerHTML += `<option value="${type}">${type}</option>`;
  });
}

// ---- RENDER GALLERY ----
function renderGallery(data) {
  const category = document.getElementById("categoryFilter").value;
  const type = document.getElementById("typeFilter").value;

  const filtered = data.filter(item =>
    (category === "" || item.Category === category) &&
    (type === "" || item.Type === type)
  );

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  filtered.forEach(item => {
    gallery.innerHTML += `
      <div class="item">
        <img src="${item.Image}" alt="${item.Name}">
        <div>${item.Name}</div>
      </div>
    `;
  });
}

// ---- INIT ----
loadCSV().then(data => {
  window.DATA = data;
  populateFilters(data);
  renderGallery(data);

  document.getElementById("categoryFilter").addEventListener("change", () => renderGallery(DATA));
  document.getElementById("typeFilter").addEventListener("change", () => renderGallery(DATA));
});
</script>

</body>
</html>
