<!DOCTYPE html>
<html>
<head>
  <title>Gallery Filter</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    select { margin-right: 10px; padding: 5px; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .item img {
      width: 100%;
      border-radius: 8px;
    }

    .item p {
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>Image Gallery</h2>

<select id="categoryFilter">
  <option value="">All Categories</option>
</select>

<select id="typeFilter">
  <option value="">All Types</option>
</select>

<div class="gallery" id="gallery"></div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRStPO8x9fBkPafkwC-LjRP7d9Q8Y6hVfSbp--bI1hsIS9CbUfKyhmARF_fmyoS-lr-_qra59nFy9Cu/pub?gid=2043653487&single=true&output=csv";

let data = [];

fetch(csvUrl)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);
    data = rows.map(row => {
      const [name, category, type, image] = row.split(",");
      return { name, category, type, image };
    });

    populateFilters();
    renderGallery();
  });

function populateFilters() {
  const categories = [...new Set(data.map(d => d.category))];
  const types = [...new Set(data.map(d => d.type))];

  const catSelect = document.getElementById("categoryFilter");
  const typeSelect = document.getElementById("typeFilter");

  categories.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    catSelect.appendChild(opt);
  });

  types.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  });

  catSelect.addEventListener("change", renderGallery);
  typeSelect.addEventListener("change", renderGallery);
}

function renderGallery() {
  const cat = document.getElementById("categoryFilter").value;
  const type = document.getElementById("typeFilter").value;

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const filtered = data.filter(d => {
    return (!cat || d.category === cat) &&
           (!type || d.type === type);
  });

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <p>${item.name}</p>
    `;

    gallery.appendChild(div);
  });
}
</script>

</body>
</html>
