<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Filtered Image Gallery</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .filters { display: flex; gap: 10px; margin-bottom: 20px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .item { border: 1px solid #ccc; padding: 10px; text-align: center; }
    .item img { width: 100%; height: auto; }
  </style>
</head>
<body>

<h2>Image Gallery</h2>

<div class="filters">
  <select id="categoryFilter">
    <option value="">All Categories</option>
  </select>

  <select id="typeFilter">
    <option value="">All Types</option>
  </select>

  <input type="text" id="searchBox" placeholder="Search by name">
</div>

<div class="gallery" id="gallery"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRStPO8x9fBkPafkwC-LjRP7d9Q8Y6hVfSbp--bI1hsIS9CbUfKyhmARF_fmyoS-lr-_qra59nFy9Cu/pub?gid=2043653487&single=true&output=csv";

let data = [];

async function loadCSV() {
  const response = await fetch(CSV_URL);
  const text = await response.text();
  const rows = text.split("\n").map(r => r.split(","));

  const headers = rows.shift();
  data = rows.map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
    return obj;
  });

  populateFilters();
  renderGallery();
}

function populateFilters() {
  const categorySet = new Set();
  const typeSet = new Set();

  data.forEach(item => {
    if (item.Category) categorySet.add(item.Category);
    if (item.Type) typeSet.add(item.Type);
  });

  const categoryFilter = document.getElementById("categoryFilter");
  const typeFilter = document.getElementById("typeFilter");

  categorySet.forEach(cat => {
    categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
  });

  typeSet.forEach(type => {
    typeFilter.innerHTML += `<option value="${type}">${type}</option>`;
  });

  categoryFilter.addEventListener("change", renderGallery);
  typeFilter.addEventListener("change", renderGallery);
  document.getElementById("searchBox").addEventListener("input", renderGallery);
}

function renderGallery() {
  const category = document.getElementById("categoryFilter").value;
  const type = document.getElementById("typeFilter").value;
  const search = document.getElementById("searchBox").value.toLowerCase();

  const filtered = data.filter(item => {
    return (!category || item.Category === category) &&
           (!type || item.Type === type) &&
           (!search || item.Name.toLowerCase().includes(search));
  });

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  filtered.forEach(item => {
    gallery.innerHTML += `
      <div class="item">
        <img src="${item.Image}" alt="${item.Name}">
        <h4>${item.Name}</h4>
        <p>${item.Category} — ${item.Type}</p>
      </div>
    `;
  });
}

loadCSV();
</script>

</body>
</html>
