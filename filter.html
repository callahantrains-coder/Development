<!DOCTYPE html>
<html>
<head>
  <title>CSV Filter Demo</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    select { margin-right: 20px; }
    table { border-collapse: collapse; margin-top: 20px; }
    td, th { border: 1px solid #ccc; padding: 8px; }
  </style>
</head>
<body>

<h2>Filter Data</h2>

<label>Filter 1:</label>
<select id="filter1"></select>

<label>Filter 2:</label>
<select id="filter2"></select>

<table id="output"></table>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRStPO8x9fBkPafkwC-LjRP7d9Q8Y6hVfSbp--bI1hsIS9CbUfKyhmARF_fmyoS-lr-_qra59nFy9Cu/pub?gid=2043653487&single=true&output=csv";

// Parse CSV into array of objects
function parseCSV(text) {
  const [headerLine, ...lines] = text.trim().split("\n");
  const headers = headerLine.split(",");
  return lines.map(line => {
    const values = line.split(",");
    return Object.fromEntries(headers.map((h, i) => [h, values[i]]));
  });
}

function populateDropdown(id, items) {
  const select = document.getElementById(id);
  select.innerHTML = "<option value=''>All</option>";
  [...new Set(items)].forEach(item => {
    const opt = document.createElement("option");
    opt.value = item;
    opt.textContent = item;
    select.appendChild(opt);
  });
}

function renderTable(data) {
  const table = document.getElementById("output");
  if (data.length === 0) {
    table.innerHTML = "<tr><td>No results</td></tr>";
    return;
  }
  const headers = Object.keys(data[0]);
  table.innerHTML =
    "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>" +
    data.map(row =>
      "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join("") + "</tr>"
    ).join("");
}

fetch(csvUrl)
  .then(res => res.text())
  .then(text => {
    const data = parseCSV(text);

    // Auto-fill dropdowns from two columns
    const col1 = data.map(r => r["Category"]); // change to your column name
    const col2 = data.map(r => r["Tags"]); // change to your column name

    populateDropdown("filter1", col1);
    populateDropdown("filter2", col2);

    function applyFilters() {
      const f1 = document.getElementById("Category").value;
      const f2 = document.getElementById("Tags").value;

      const filtered = data.filter(row =>
        (f1 === "" || row["Column1"] === f1) &&
        (f2 === "" || row["Column2"] === f2)
      );

      renderTable(filtered);
    }

    document.getElementById("filter1").addEventListener("change", applyFilters);
    document.getElementById("filter2").addEventListener("change", applyFilters);

    renderTable(data); // initial load
  });
</script>

</body>
</html>
